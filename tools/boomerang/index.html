<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boomerang Video | Online MP4 Video Editor</title>
    <script src="../../coi-serviceworker.js"></script>
    <link rel="stylesheet" href="../../css/style.css">
    <script src="../../js/i18n.js"></script>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.0/dist/ffmpeg.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-top">
                <div class="header-left">
                    <a href="../../index.html" class="btn-home" title="Home">🏠</a>
                    <h1 data-i18n="title">Video Editor</h1>
                </div>
                <div class="header-right">
                    <button id="theme-toggle" class="theme-toggle" title="Toggle Theme">🌓</button>
                    <select id="lang-selector" class="lang-selector">
                        <option value="ko">한국어</option>
                        <option value="en">English</option>
                        <option value="zh">中文</option>
                        <option value="ja">日本語</option>
                    </select>
                </div>
            </div>
            <nav class="nav-menu">
                <a href="../../index.html" class="nav-link" data-i18n="trim">Trim</a>
                <a href="../crop/index.html" class="nav-link" data-i18n="crop">Crop</a>
                <a href="../merge/index.html" class="nav-link" data-i18n="merge">Merge</a>
                <a href="../sync/index.html" class="nav-link" data-i18n="sync">Sync</a>
                <a href="../frames/index.html" class="nav-link" data-i18n="frames">Frames</a>
                <a href="index.html" class="nav-link active" data-i18n="boomerang">Boomerang</a>
            </nav>
            <div id="status" class="status-badge" data-i18n="status_init">FFmpeg initializing...</div>
        </header>

        <main>
            <section class="upload-area" id="drop-zone">
                <input type="file" id="uploader" accept="video/mp4" class="hidden">
                <div class="upload-content">
                    <span class="upload-icon">+</span>
                    <p class="upload-label" data-i18n="upload_label_boomerang">부메랑으로 만들 비디오를 선택하세요</p>
                </div>
            </section>

            <section id="editor-container" class="editor-main hidden">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title" data-i18n="boomerang_settings_title">부메랑 설정</h3>
                    </div>
                    <div class="card-content">
                        <div class="preview-wrapper" style="margin-bottom: 16px;">
                            <video id="source-preview" controls style="width:100%; border-radius: var(--radius); background:#000;"></video>
                        </div>

                        <div style="margin-bottom: 16px;">
                            <label class="checkbox-wrapper">
                                <input type="checkbox" id="mute-toggle">
                                <span class="setting-label" data-i18n="boomerang_mute_label">음소거</span>
                            </label>
                        </div>

                        <button id="export-btn" class="btn-primary btn-full" data-i18n="boomerang_btn">부메랑 영상 만들기</button>
                    </div>
                </div>

                <div id="progress-container" class="progress-section hidden">
                    <div class="progress-info">
                        <span id="progress-text" data-i18n="progress_processing">Processing...</span>
                        <span id="progress-percent">0%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div id="progress-fill" class="progress-fill"></div>
                    </div>
                </div>

                <div id="download-container" class="download-section hidden">
                    <div class="result-preview-card">
                        <span class="result-preview-title" data-i18n="result_preview">결과물 미리보기</span>
                        <div class="result-video-wrapper">
                            <video id="result-video-preview" controls loop></video>
                        </div>
                    </div>
                    <div style="display:flex; gap:12px; flex-wrap:wrap;">
                        <button id="re-boomerang-btn" class="btn-outline btn-full" data-i18n="re_boomerang_btn">결과물로 다시 부메랑 만들기</button>
                        <a id="download-link" href="#" download="boomerang.mp4" class="btn-download" data-i18n="download_btn">결과 다운로드</a>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <div class="footer-links">
                <a href="https://jkh-ml.github.io/image-editor/" target="_blank" class="btn-footer-tool">
                    🖼️ Image Editor
                </a>
                <a href="https://jkh-ml.github.io/audio-editor/" target="_blank" class="btn-footer-tool">
                    🎵 Audio Editor
                </a>
                <a href="https://github.com/JKH-ML/video-editor" target="_blank" class="btn-repo">
                    <svg viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                    <span data-i18n="repo">GitHub Repository</span>
                </a>
            </div>
        </footer>
    </div>
    <script src="boomerang.js"></script>
</body>
</html>
