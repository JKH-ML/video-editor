<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Merge | Online MP4 Video Editor</title>
    <script src="coi-serviceworker.js"></script>
    <link rel="stylesheet" href="style.css">
    <script src="i18n.js"></script>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.0/dist/ffmpeg.min.js"></script>
    <style>
        .file-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: var(--secondary);
            border-radius: var(--radius);
            margin-bottom: 8px;
            font-size: 0.875rem;
        }
        .file-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            overflow: hidden;
        }
        .file-name {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .file-size {
            font-size: 0.75rem;
            color: var(--muted-foreground);
        }
        .remove-file {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 1.25rem;
            padding: 0 8px;
        }
        .file-controls {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .control-btn {
            background: var(--background);
            border: 1px solid var(--border);
            color: var(--foreground);
            border-radius: 4px;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.875rem;
            padding: 0;
        }
        .control-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .control-btn:hover:not(:disabled) {
            background: var(--secondary);
        }
        .empty-msg {
            text-align: center;
            color: var(--muted-foreground);
            padding: 20px;
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-top">
                <div class="header-left">
                    <a href="index.html" class="btn-home" title="Home">🏠</a>
                    <h1 data-i18n="title">Video Editor</h1>
                </div>
                <div class="header-right">
                    <button id="theme-toggle" class="theme-toggle" title="Toggle Theme">🌓</button>
                    <select id="lang-selector" class="lang-selector">
                        <option value="ko">한국어</option>
                        <option value="en">English</option>
                        <option value="zh">中文</option>
                        <option value="ja">日本語</option>
                    </select>
                </div>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link" data-i18n="trim">Trim</a>
                <a href="crop.html" class="nav-link" data-i18n="crop">Crop</a>
                <a href="merge.html" class="nav-link active" data-i18n="merge">Merge</a>
            </nav>
            <div id="status" class="status-badge" data-i18n="status_init">FFmpeg initializing...</div>
        </header>
        
        <main>
            <section class="upload-area" id="drop-zone">
                <input type="file" id="uploader" accept="video/mp4" multiple class="hidden">
                <div class="upload-content">
                    <span class="upload-icon">↑</span>
                    <p class="upload-label" data-i18n="upload_label_merge">Select MP4 files to merge (Multiple allowed)</p>
                </div>
            </section>

            <section id="editor-container" class="editor-main hidden">
                <div class="controls-grid" style="grid-template-columns: 1fr;">
                    <!-- Merge List Card -->
                    <div class="card">
                        <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
                            <h3 class="card-title" data-i18n="merge_list_title">Merge List</h3>
                            <button id="clear-list-btn" class="btn-outline" style="height: 28px; padding: 0 10px; font-size: 0.75rem;" data-i18n="clear_list_btn">Clear All</button>
                        </div>
                        <div class="card-content">
                            <ul id="file-list" class="file-list">
                                <!-- File items will be added here -->
                            </ul>
                            <div id="no-files-msg" class="empty-msg" data-i18n="no_files_msg">No files selected.</div>
                            
                            <button id="add-more-btn" class="btn-secondary btn-full" style="margin-top: 16px;">+ Add More Files</button>
                        </div>
                    </div>

                    <!-- Actions Card -->
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title" data-i18n="actions_title">Actions</h3>
                        </div>
                        <div class="card-content action-card-content">
                            <button id="export-btn" class="btn-primary btn-full" data-i18n="merge_btn">Merge Videos</button>
                        </div>
                    </div>
                </div>

                <!-- Progress -->
                <div id="progress-container" class="progress-section hidden">
                    <div class="progress-info">
                        <span id="progress-text" data-i18n="progress_processing">Processing...</span>
                        <span id="progress-percent">0%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div id="progress-fill" class="progress-fill"></div>
                    </div>
                </div>

                <!-- Download -->
                <div id="download-container" class="download-section hidden">
                    <a id="download-link" href="#" download="merged.mp4" class="btn-download" data-i18n="download_btn">Download Result</a>
                </div>
            </section>
        </main>
        <footer>
            <a href="https://github.com/JKH-ML/insta-cut" target="_blank" class="btn-repo">
                <svg viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                <span data-i18n="repo">GitHub Repository</span>
            </a>
        </footer>
    </div>
    <script src="merge.js"></script>
</body>
</html>
